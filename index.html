<!DOCTYPE html>
<html lang="en">

<head>
  <title>Configurator Login</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./styles/login-styles.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/themes/light.css" />
  <script type="module"
    src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/shoelace-autoloader.js"></script>

</head>

<body>

  <body>
    <div id="app" class="login-page">
      <div class="login-card" id="login-card">
        <div class="login-card-inner">
          <div class="login-brand">
            <div class="login-logo">W</div>
            <div class="login-brand-text">
              <div class="login-title">Warp Configurator</div>
              <div class="login-subtitle">Sign in to access your spaces</div>
            </div>
          </div>

          <div class="login-divider"></div>

          <button id="btnGoogle" class="login-btn login-btn-primary" type="button">
            <span class="login-btn-icon" aria-hidden="true">G</span>
            <span>Continue with Google</span>
          </button>


        </div>
      </div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>

</html>
